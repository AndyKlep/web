<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Карточки пользователей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cards">
    <!-- Карточка 1 -->
    <div class="card">
        <div class="photo">
            <img src="user1.webp" alt="Фото пользователя 1">
        </div>
        <div class="info">
            <h2>Блейдов Блейд Блейдович</h2>
            <p class="email">blade@example.com</p>
            <p class="birth">Дата рождения: 12.03.1995</p>
            <p class="city">Город: Москва</p>
        </div>
    </div>

    <!-- Карточка 2 -->
    <div class="card">
        <div class="photo">
            <img src="user2.png" alt="Фото пользователя 2">
        </div>
        <div class="info">
            <h2>Генералов Иван Петрович</h2>
            <p class="email">gen@example.com</p>
            <p class="birth">Дата рождения: 27.11.1992</p>
            <p class="city">Город: Санкт‑Петербург</p>
        </div>
    </div>

    <!-- Карточка 3 -->
    <div class="card">
        <div class="photo">
            <img src="user3.jpg" alt="Фото пользователя 3">
        </div>
        <div class="info">
            <h2>Джокеров Олег Николаевич</h2>
            <p class="email">persona@example.com</p>
            <p class="birth">Дата рождения: 05.06.1988</p>
            <p class="city">Город: Новосибирск</p>
        </div>
    </div>
</div>

</body>
</html>
