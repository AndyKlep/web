<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рейтинг любимых и нелюбимых блюд</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f5f5f5;
      color: #222;
    }
    h1 {
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #e9ecef;
    }
    img {
      width: 180px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
    a {
      color: #0b57d0;
    }
  </style>
</head>
<body>
  <h1>Таблица рейтинга любимых/нелюбимых блюд</h1>
  <table>
    <thead>
      <tr>
        <th>Название блюда</th>
        <th>Оценка</th>
        <th>Ссылка на рецепт</th>
        <th>Фото блюда</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Жареная картошка</td>
        <td>0</td>
        <td><a href="https://menunedeli.ru/2011/08/kak-zharit-kartoshku-recept-s-foto-i-xitrostyami/" target="_blank" rel="noopener noreferrer">Рецепт</a></td>
        <td><img src="bulba.jpeg" alt="Жареная картошка" loading="lazy" /></td>
      </tr>
      <tr>

      </tr>
      <tr>
        <td>Пельмени</td>
        <td>0</td>
        <td><a href="https://gotovim-doma.ru/recipe/5-pelmeni" target="_blank" rel="noopener noreferrer">Рецепт</a></td>
        <td><img src="pelmen.jpg" alt="Пельмени" loading="lazy" /></td>
      </tr>
      <tr>
        <td>Творожная запеканка</td>
        <td>0</td>

      <tr>

</html>
